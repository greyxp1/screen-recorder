# Bongo Cat — a cat that sits in your bar and slaps when you type or to the beat.
#
# Keyboard reactivity needs `evtest` installed and your user in the `input` group;
# set the keyboard device in the widget settings. Audio reactivity uses the
# PipeWire spectrum.

id = "noctalia/bongocat"
name = "Bongo Cat"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "noctalia"
license = "MIT"
icon = "cat"
description = "A cat that slaps your bar when you type or to the beat."
tags = ["fun", "animation", "cat"]

[[widget]]
id = "cat"
entry = "bongocat.luau"

  [[widget.setting]]
  key = "input_device"
  type = "file"
  label = "Keyboard device"
  description = "/dev/input/eventN — requires evtest and membership in the input group"

  [[widget.setting]]
  key = "audio_spectrum"
  type = "bool"
  label = "React to audio"
  default = false

  [[widget.setting]]
  key = "tappy_mode"
  type = "bool"
  label = "Tap to the beat"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }

  [[widget.setting]]
  key = "rave_mode"
  type = "bool"
  label = "Rave colors on beat"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }

  [[widget.setting]]
  key = "use_mpris_filter"
  type = "bool"
  label = "Only react while media plays"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }
